# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

reviews:
  # 'assertive' makes the AI direct, strict, and focused on technical excellence
  profile: "assertive"
  
  # When set to true, CodeRabbit will formally "Request Changes" if issues are found
  request_changes_workflow: true

  # Set to false to hide the "Review Status" message you mentioned earlier
  review_status: false

  auto_review:
    enabled: true
    drafts: false
    # Allows reviews on all branches, fixing the "Review skipped" error
    base_branches:
      - "*"

  high_level_summary: true

# Custom instructions to reinforce the assertive tone
tone_instructions: |
  Be a strict senior engineer. 
  Focus on performance, security, and idiomatic code. 
  Do not give "good job" style compliments; focus only on improvements and bugs. 
  Keep feedback concise and technically rigorous.

# Ignore non-code files to keep the review focused
path_filters:
  - "!**/node_modules/**"
  - "!**/dist/**"
  - "!**/*.lock"
  - "!**/*.md"
