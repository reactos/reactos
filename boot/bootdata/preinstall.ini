[FREELOADER]
DefaultOS=ReactOS
TimeOut=5

[Display]
TitleText=ReactOS
MinimalUI=Yes

[Operating Systems]
ReactOS="ReactOS"
ReactOS_Debug="ReactOS (Debug)"
ReactOS_VBoxDebug="ReactOS (VBox Debug)"
ReactOS_Screen="ReactOS (Screen)"
ReactOS_LogFile="ReactOS (Log file)"

[ReactOS]
BootType=Windows2003
SystemPath=multi(0)disk(0)rdisk(0)partition(1)\ReactOS
Options=/FASTDETECT /SOS

[ReactOS_Debug]
BootType=Windows2003
SystemPath=multi(0)disk(0)rdisk(0)partition(1)\ReactOS
Options=/DEBUG /DEBUGPORT=COM1 /BAUDRATE=115200 /SOS /FASTDETECT

[ReactOS_VBoxDebug]
BootType=Windows2003
SystemPath=multi(0)disk(0)rdisk(0)partition(1)\ReactOS
Options=/DEBUG /DEBUGPORT=VBOX /SOS /FASTDETECT

[ReactOS_Screen]
BootType=Windows2003
SystemPath=multi(0)disk(0)rdisk(0)partition(1)\ReactOS
Options=/DEBUG /DEBUGPORT=SCREEN /SOS /FASTDETECT

[ReactOS_LogFile]
BootType=Windows2003
SystemPath=multi(0)disk(0)rdisk(0)partition(1)\ReactOS
Options=/DEBUG /DEBUGPORT=FILE /SOS /FASTDETECT
